kind = "web"
previewPath = "/"
title = "OpenEnv Dashboard"
version = "1.0.0"
id = "artifacts/openenv-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22352

[services.development]
run = "pnpm --filter @workspace/openenv-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/openenv-dashboard", "run", "build" ]
publicDir = "artifacts/openenv-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22352"
BASE_PATH = "/"
