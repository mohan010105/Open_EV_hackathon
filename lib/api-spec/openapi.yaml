openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: OpenEnv — Web Navigation + Workspace Assistant Training Environment API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: environment
    description: Web Navigation RL Environment
  - name: workspace
    description: Workspace Assistant RL Environment
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Web Navigation Environment ──────────────────────────────────────────
  /env/reset:
    post:
      operationId: resetEnvironment
      tags: [environment]
      summary: Reset the web navigation environment
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetRequest"
      responses:
        "200":
          description: Environment reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepResult"

  /env/step:
    post:
      operationId: stepEnvironment
      tags: [environment]
      summary: Step the web navigation environment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepRequest"
      responses:
        "200":
          description: Step result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepResult"
        "400":
          description: Invalid action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /env/state:
    get:
      operationId: getEnvironmentState
      tags: [environment]
      summary: Get web navigation state
      responses:
        "200":
          description: Current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentState"

  /env/tasks:
    get:
      operationId: listTasks
      tags: [environment]
      summary: List web navigation tasks
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"

  /env/sessions:
    get:
      operationId: getSessions
      tags: [environment]
      summary: Get web navigation session history
      responses:
        "200":
          description: Session history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionHistory"

  # ── Workspace Environment ────────────────────────────────────────────────
  /workspace/reset:
    post:
      operationId: resetWorkspace
      tags: [workspace]
      summary: Reset the workspace environment
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceResetRequest"
      responses:
        "200":
          description: Workspace reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceStepResult"

  /workspace/step:
    post:
      operationId: stepWorkspace
      tags: [workspace]
      summary: Step the workspace environment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceStepRequest"
      responses:
        "200":
          description: Step result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceStepResult"
        "400":
          description: Invalid action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspace/state:
    get:
      operationId: getWorkspaceState
      tags: [workspace]
      summary: Get current workspace state
      responses:
        "200":
          description: Current workspace state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvironmentState"

  /workspace/tasks:
    get:
      operationId: listWorkspaceTasks
      tags: [workspace]
      summary: List workspace tasks
      responses:
        "200":
          description: Workspace tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceTaskList"

  /workspace/sessions:
    get:
      operationId: getWorkspaceSessions
      tags: [workspace]
      summary: Get workspace session history
      responses:
        "200":
          description: Session history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionHistory"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    # ── Web Nav shared schemas ─────────────────────────────────────────────
    ResetRequest:
      type: object
      properties:
        taskId:
          type: string
        seed:
          type: integer

    StepRequest:
      type: object
      properties:
        action:
          type: string
        params:
          type: object
          additionalProperties: true
      required: [action]

    StepResult:
      type: object
      properties:
        observation:
          $ref: "#/components/schemas/Observation"
        reward:
          type: number
        done:
          type: boolean
        info:
          type: object
          additionalProperties: true
      required: [observation, reward, done]

    Observation:
      type: object
      properties:
        page:
          type: string
        available_actions:
          type: array
          items:
            type: string
        search_results:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        current_product:
          $ref: "#/components/schemas/Product"
        cart_items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        task_description:
          type: string
        task_id:
          type: string
        step_count:
          type: integer
        total_reward:
          type: number
      required: [page, available_actions, task_description, task_id, step_count, total_reward]

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        category:
          type: string
        description:
          type: string
        rating:
          type: number
      required: [id, name, price, category]

    EnvironmentState:
      type: object
      properties:
        observation:
          $ref: "#/components/schemas/Observation"
        session_id:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
      required: [observation, session_id, is_active]

    TaskList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required: [tasks]

    Task:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        target_product:
          type: string
        max_steps:
          type: integer
        reward_breakdown:
          type: object
          additionalProperties: true
      required: [id, name, description, difficulty, target_product, max_steps]

    SessionHistory:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionRecord"
        total_sessions:
          type: integer
      required: [sessions, total_sessions]

    SessionRecord:
      type: object
      properties:
        session_id:
          type: string
        task_id:
          type: string
        task_name:
          type: string
        total_reward:
          type: number
        steps_taken:
          type: integer
        completed:
          type: boolean
        grader_score:
          type: number
        started_at:
          type: string
        ended_at:
          type: string
      required: [session_id, task_id, task_name, total_reward, steps_taken, completed, grader_score, started_at]

    # ── Workspace environment schemas ──────────────────────────────────────
    WorkspaceResetRequest:
      type: object
      properties:
        taskId:
          type: string
        seed:
          type: integer

    WorkspaceStepRequest:
      type: object
      properties:
        action:
          type: string
        params:
          type: object
          additionalProperties: true
      required: [action]

    WorkspaceStepResult:
      type: object
      properties:
        observation:
          $ref: "#/components/schemas/WorkspaceObservation"
        reward:
          type: number
        done:
          type: boolean
        info:
          type: object
          additionalProperties: true
      required: [observation, reward, done]

    WorkspaceObservation:
      type: object
      properties:
        current_app:
          type: string
          description: "Active app: email_inbox | email_detail | calendar | documents | task_manager"
        email_list:
          type: array
          items:
            $ref: "#/components/schemas/Email"
        selected_email:
          $ref: "#/components/schemas/Email"
        calendar_events:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEvent"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        current_task:
          type: string
        available_actions:
          type: array
          items:
            type: string
        task_id:
          type: string
        task_description:
          type: string
        step_count:
          type: integer
        total_reward:
          type: number
      required: [current_app, email_list, calendar_events, documents, current_task, available_actions, task_id, task_description, step_count, total_reward]

    Email:
      type: object
      properties:
        id:
          type: string
        sender:
          type: string
        sender_email:
          type: string
        subject:
          type: string
        body:
          type: string
        timestamp:
          type: string
        read:
          type: boolean
        has_meeting_details:
          type: boolean
      required: [id, sender, sender_email, subject, timestamp, read]

    CalendarEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        date:
          type: string
        time:
          type: string
        attendees:
          type: array
          items:
            type: string
        location:
          type: string
        created_from_email:
          type: boolean
      required: [id, title, date, time]

    Document:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        folder:
          type: string
        type:
          type: string
        size:
          type: string
        modified:
          type: string
      required: [id, name, folder, type]

    WorkspaceEnvironmentState:
      type: object
      properties:
        observation:
          $ref: "#/components/schemas/WorkspaceObservation"
        session_id:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
      required: [observation, session_id, is_active]

    WorkspaceTaskList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceTask"
      required: [tasks]

    WorkspaceTask:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        goal:
          type: string
        max_steps:
          type: integer
        reward_breakdown:
          type: object
          additionalProperties: true
      required: [id, name, description, difficulty, goal, max_steps]
