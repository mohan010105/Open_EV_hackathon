name: ai-workspace-assistant
version: "2.0.0"
description: >
  An OpenEnv-compatible reinforcement learning environment that simulates
  a digital productivity workspace. The AI agent performs tasks such as
  reading emails, scheduling meetings, and organising documents.

author: OpenEnv
license: MIT

environment:
  type: workspace_assistant
  observation_space: structured_json
  action_space: discrete_named

# ── API Endpoints ─────────────────────────────────────────────────────────────
endpoints:
  dashboard:     GET  /
  reset:         POST /reset
  step:          POST /step
  state:         GET  /state
  episode_replay: GET /episode_replay
  all_episodes:  GET  /episodes
  tasks:         GET  /tasks
  sessions:      GET  /sessions
  health:        GET  /healthz

# ── Tasks ─────────────────────────────────────────────────────────────────────
tasks:
  - id: ws_task_1
    name: Email Retrieval
    difficulty: easy
    grader: graders.grade_email_retrieval
    max_steps: 6
    description: "Find and read the email from Alex Johnson."

  - id: ws_task_2
    name: Meeting Scheduling
    difficulty: medium
    grader: graders.grade_meeting_scheduling
    max_steps: 10
    description: "Read Alex's email and schedule the meeting in the calendar."

  - id: ws_task_3
    name: Document Organization
    difficulty: hard
    grader: graders.grade_document_organization
    max_steps: 8
    description: "Move project_proposal.pdf to the Projects folder."

# ── Actions ───────────────────────────────────────────────────────────────────
actions:
  - name: open_email_inbox
    params: []
  - name: search_email
    params: [sender]
  - name: read_email
    params: [email_id]
  - name: extract_meeting_details
    params: []
  - name: create_calendar_event
    params: []
  - name: move_document
    params: [document_id, folder]
  - name: view_calendar
    params: []
  - name: view_documents
    params: []
  - name: noop
    params: []

# ── Reward Schema ─────────────────────────────────────────────────────────────
reward_schema:
  correct_navigation:  +0.20
  correct_action:      +0.30
  task_completion:     +1.00
  incorrect_action:    -0.10
  invalid_navigation:  -0.20
  reward_range: [0.0, 1.0]

# ── Graders ───────────────────────────────────────────────────────────────────
graders:
  score_range: [0.0, 1.0]
  partial_credit: true
  scores:
    failure: 0.0
    partial: 0.5
    success: 1.0

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  platform: huggingface_spaces
  runtime: python3.10
  port: 7860
  health_check: GET /healthz
  validator_ping: POST /reset
